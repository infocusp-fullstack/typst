name: supabase-backup

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

env:
  BACKUP_ENABLED: true

jobs:
  run_db_backup:
    runs-on: ubuntu-latest

    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}   # source
      BACKUP_DB_URL: ${{ secrets.BACKUP_DB_URL }}       # target
      BACKUP_ENABLED: ${{ vars.BACKUP_ENABLED }}

    steps:
      - name: Check if backups are enabled
        run: |
          if [ "$BACKUP_ENABLED" != "true" ]; then
            echo "Backups disabled. Exiting."
            exit 0
          fi

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      # 🔥 Optional but recommended (prevents duplicates/conflicts)
      - name: Reset backup DB
        run: |
          psql "$BACKUP_DB_URL" -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"

      # 🚀 Main backup + restore
      - name: Backup and restore
        run: |
          set -e
          pg_dump "$SUPABASE_DB_URL" \
            --no-owner \
            --no-privileges \
            --clean \
          | psql "$BACKUP_DB_URL"