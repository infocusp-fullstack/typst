---
name: Bug report
description: Create a report to help us reproduce and fix the issue
title: '[Bug]: '
labels: bug
assignees: ''

body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is
      placeholder: Tell us what happened
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen
      placeholder: Tell us what should have happened
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem

  - type: input
    id: os
    attributes:
      label: OS
      description: e.g., iOS, Windows, Linux
      placeholder: Your operating system

  - type: input
    id: version
    attributes:
      label: Version
      description: Version of the software
      placeholder: Version number

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here